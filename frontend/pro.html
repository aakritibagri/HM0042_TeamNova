<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - GrowBuddy</title>
    <link rel="stylesheet" href="pro.css">
</head>
<body>

    <div class="profile-container">
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-image">
                    <img src="https://cdn-icons-png.flaticon.com/512/7336/7336395.png" alt="User Avatar">
                </div>
                <h1 class="username">Aakriti Bagri</h1>
                <p class="user-role">Web Developer</p>
            </div>
            <div class="profile-details">
                <div class="detail-item">
                    <strong>Email:</strong>
                    <span>aakriti@example.com</span>
                </div>
                <div class="detail-item">
                    <strong>Location:</strong>
                    <span>Pune, India</span>
                </div>
                <div class="detail-item">
                    <strong>Joined:</strong>
                    <span>January 2025</span>
                </div>
            </div>
            <button class="edit-btn" onclick="editProfile()">Edit Profile</button>
        </div>
    </div>

    <script src="profile.js"></script>

</body>
</html>
